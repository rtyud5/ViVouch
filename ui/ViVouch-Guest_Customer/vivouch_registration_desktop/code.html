<!DOCTYPE html>

<style>
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center p-4">
<!-- Registration Container -->
<main class="w-full max-w-md bg-surface-container-lowest rounded-xl shadow-lg p-section-gap flex flex-col gap-6">
<!-- Header -->
<header class="flex items-center gap-4 border-b border-surface-variant pb-4">
<button aria-label="Go back" class="text-on-surface hover:text-primary transition-colors flex items-center justify-center p-2 rounded-full hover:bg-surface-container-low">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-on-surface m-0">Tạo tài khoản</h1>
</header>
<!-- Form -->
<form class="flex flex-col gap-4">
<!-- Full Name -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant" for="fullname">Họ và tên</label>
<input class="w-full px-4 py-3 rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface font-body-md text-body-md focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors placeholder:text-outline" id="fullname" name="fullname" placeholder="Nhập họ và tên" type="text"/>
</div>
<!-- Email -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant" for="email">Email</label>
<input class="w-full px-4 py-3 rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface font-body-md text-body-md focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors placeholder:text-outline" id="email" name="email" placeholder="Nhập địa chỉ email" type="email"/>
</div>
<!-- Phone Number -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant" for="phone">Số điện thoại</label>
<input class="w-full px-4 py-3 rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface font-body-md text-body-md focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors placeholder:text-outline" id="phone" name="phone" placeholder="Nhập số điện thoại" type="tel"/>
</div>
<!-- Password -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Mật khẩu</label>
<div class="relative w-full">
<input class="w-full px-4 py-3 pr-12 rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface font-body-md text-body-md focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors placeholder:text-outline" id="password" name="password" placeholder="Nhập mật khẩu" type="password"/>
<button aria-label="Toggle password visibility" class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary p-1" type="button">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 0;">visibility_off</span>
</button>
</div>
</div>
<!-- Confirm Password -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant" for="confirm_password">Xác nhận mật khẩu</label>
<div class="relative w-full">
<input class="w-full px-4 py-3 pr-12 rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface font-body-md text-body-md focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors placeholder:text-outline" id="confirm_password" name="confirm_password" placeholder="Nhập lại mật khẩu" type="password"/>
<button aria-label="Toggle confirm password visibility" class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary p-1" type="button">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 0;">visibility_off</span>
</button>
</div>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start gap-3 mt-2">
<div class="flex items-center h-5 mt-0.5">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary focus:ring-2 bg-surface-container-lowest cursor-pointer" id="terms" name="terms" type="checkbox"/>
</div>
<label class="font-body-md text-body-md text-on-surface-variant leading-tight cursor-pointer" for="terms">
                    Tôi đồng ý với <a class="text-primary hover:text-primary-container underline underline-offset-2 transition-colors" href="#">Điều khoản sử dụng</a> và <a class="text-primary hover:text-primary-container underline underline-offset-2 transition-colors" href="#">Chính sách bảo mật</a>
</label>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary hover:bg-primary-container text-on-primary font-label-md text-label-md py-3.5 px-6 rounded-lg transition-colors mt-4 shadow-sm active:scale-[0.98] transform duration-150" type="submit">
                Đăng ký
            </button>
</form>
<!-- Footer -->
<div class="text-center mt-2">
<p class="font-body-md text-body-md text-on-surface-variant">
                Đã có tài khoản? <a class="text-primary font-label-md hover:underline underline-offset-2 transition-all" href="#">Đăng nhập</a>
</p>
</div>
</main>
<script>
        // Simple password toggle logic for visual feedback
        const toggleButtons = document.querySelectorAll('button[aria-label^="Toggle"]');
        toggleButtons.forEach(btn => {
            btn.addEventListener('click', function() {
                const input = this.previousElementSibling;
                const icon = this.querySelector('span');
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.textContent = 'visibility';
                } else {
                    input.type = 'password';
                    icon.textContent = 'visibility_off';
                }
            });
        });
    </script>
</body></html>
