<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>

                    "fontFamily": {

                        "body-lg": ["Be Vietnam Pro"],

<style>
        body { font-family: 'Be Vietnam Pro', sans-serif; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col md:hidden pb-[80px] pt-16">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-container-margin h-16 bg-surface dark:bg-surface-container-low border-b border-outline-variant dark:border-outline">
<button aria-label="Back" class="text-on-surface-variant p-2 -ml-2 rounded-full hover:bg-surface-container-high transition-colors hover:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="text-headline-md font-headline-md text-primary dark:text-primary-fixed">Giỏ hàng</h1>
<button aria-label="Cart" class="text-on-surface-variant p-2 -mr-2 rounded-full hover:bg-surface-container-high transition-colors">
<!-- Empty space for balance if trailing icon is not strictly needed for this specific state, but following JSON -->
<span class="material-symbols-outlined opacity-0" data-icon="shopping_cart">shopping_cart</span>
</button>
</header>
<!-- Main Content: Empty State -->
<main class="flex-grow flex flex-col items-center justify-center px-container-margin py-section-gap text-center">
<div class="w-48 h-48 mb-8 rounded-full bg-surface-container-low flex items-center justify-center shadow-[0_4px_20px_rgba(0,0,0,0.05)]">
<span class="material-symbols-outlined text-[80px] text-outline-variant" data-icon="shopping_bag" style="font-variation-settings: 'FILL' 0, 'wght' 300;">shopping_bag</span>
</div>
<h2 class="text-headline-lg-mobile font-headline-lg-mobile text-on-background mb-4">Giỏ hàng trống</h2>
<p class="text-body-md font-body-md text-on-surface-variant mb-12 max-w-[280px]">
            Có vẻ như bạn chưa chọn voucher nào. Khám phá ngay hàng ngàn ưu đãi hấp dẫn đang chờ bạn!
        </p>
<button class="w-full max-w-[320px] bg-primary text-on-primary py-4 px-6 rounded-full font-label-md text-label-md shadow-[0_4px_14px_rgba(0,105,76,0.3)] hover:bg-surface-tint hover:shadow-[0_6px_20px_rgba(0,105,76,0.4)] transition-all active:scale-95 flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[20px]" data-icon="explore">explore</span>
            Khám phá voucher
        </button>
</main>
<!-- BottomNavBar -->
<!-- Suppressed on transactional/focus pages according to rules, but user explicitly asked for it: "Bottom navigation bar present." so rendering it. Contextually, "Trang chủ" might be active if they navigated here from home, but let's assume they are browsing deals, so Explore might be a good fit, or just generic. We will make 'Khám phá' active as a CTA. -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 pb-safe bg-surface dark:bg-surface-container-high shadow-[0_-4px_20px_rgba(0,0,0,0.05)] rounded-t-xl hidden md:hidden" style="display: flex;">
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined mb-1" data-icon="home">home</span>
<span class="text-label-md font-label-md text-[10px]">Trang chủ</span>
</button>
<button class="flex flex-col items-center justify-center text-primary dark:text-primary-fixed bg-primary-container/20 rounded-xl px-3 py-1 scale-90 transition-transform">
<span class="material-symbols-outlined mb-1" data-icon="explore" data-weight="fill" style="font-variation-settings: 'FILL' 1;">explore</span>
<span class="text-label-md font-label-md text-[10px]">Khám phá</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined mb-1" data-icon="confirmation_number">confirmation_number</span>
<span class="text-label-md font-label-md text-[10px]">Ưu đãi</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined mb-1" data-icon="person">person</span>
<span class="text-label-md font-label-md text-[10px]">Tài khoản</span>
</button>
</nav>
</body></html>
