<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>

                    "error-container": "#ffdad6",
                    "primary-fixed": "#86f8c9",

            "spacing": {

                    "gutter": "12px",

<style>
        body { font-family: 'Be Vietnam Pro', sans-serif; }
    </style>
</head>
<body class="bg-background min-h-screen flex items-center justify-center p-4">
<!-- Background Decoration (Optional subtle pattern/gradient) -->
<div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] rounded-full bg-primary-container opacity-20 blur-3xl"></div>
<div class="absolute top-[60%] -right-[10%] w-[30%] h-[30%] rounded-full bg-secondary-container opacity-10 blur-3xl"></div>
</div>
<!-- Login Container -->
<div class="bg-surface-container-lowest rounded-xl shadow-lg w-full max-w-md p-8 md:p-12 relative z-10 border border-surface-variant">
<!-- Brand Header -->
<div class="text-center mb-8">
<h1 class="font-display-lg text-display-lg text-primary mb-2">ViVouch</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Mua voucher — Tiết kiệm mỗi ngày</p>
</div>
<!-- Login Form -->
<form action="#" class="space-y-6" method="POST">
<!-- Email Field (Error State) -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-2" for="email">Email</label>
<div class="relative">
<input aria-describedby="email-error" aria-invalid="true" class="block w-full rounded-lg border-error bg-error-container/10 px-4 py-3 font-body-md text-body-md text-on-surface placeholder-on-surface-variant focus:border-error focus:ring-error focus:ring-1 sm:text-sm" id="email" name="email" type="email" value="invalid-email"/>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-3">
<span class="material-symbols-outlined text-error" data-icon="error">error</span>
</div>
</div>
<p class="mt-2 font-body-md text-body-md text-error text-sm" id="email-error">Email không hợp lệ</p>
</div>
<!-- Password Field -->
<div>
<div class="flex items-center justify-between mb-2">
<label class="block font-label-md text-label-md text-on-surface" for="password">Mật khẩu</label>
<a class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors" href="#">Quên mật khẩu?</a>
</div>
<div class="relative">
<input class="block w-full rounded-lg border-outline-variant bg-surface px-4 py-3 font-body-md text-body-md text-on-surface placeholder-on-surface-variant focus:border-primary focus:ring-primary focus:ring-1 sm:text-sm" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Submit Button -->
<div>
<button class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-lg shadow-sm font-label-md text-label-md text-on-primary bg-primary hover:bg-surface-tint focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors" type="submit">
                    Đăng nhập
                </button>
</div>
</form>
<!-- Divider -->
<div class="mt-8 mb-6">
<div class="relative">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-2 bg-surface-container-lowest text-on-surface-variant font-body-md text-body-md text-sm">hoặc</span>
</div>
</div>
</div>
<!-- Registration Link -->
<div class="text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                Chưa có tài khoản? 
                <a class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors ml-1" href="#">Đăng ký ngay</a>
</p>
</div>
</div>
</body></html>
