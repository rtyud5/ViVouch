<body class="min-h-screen flex flex-col justify-center px-container-margin py-section-gap max-w-md mx-auto">
<!-- Header Section -->
<div class="text-center mb-10 flex flex-col items-center">
<h1 class="font-display-lg text-display-lg text-primary mb-2">ViVouch</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Mua voucher — Tiết kiệm mỗi ngày</p>
</div>
<!-- Main Content Canvas (Login Form) -->
<main class="w-full">
<form class="space-y-6">
<!-- Email Field -->
<div>
<label class="sr-only" for="email">Email</label>
<input class="w-full px-4 py-3 rounded-lg border border-outline-variant bg-surface-container-lowest font-body-md text-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder-outline" id="email" name="email" placeholder="email@example.com" type="email"/>
</div>
<!-- Password Field -->
<div class="relative">
<label class="sr-only" for="password">Password</label>
<input class="w-full px-4 py-3 rounded-lg border border-outline-variant bg-surface-container-lowest font-body-md text-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder-outline pr-12" id="password" name="password" placeholder="Mật khẩu" type="password"/>
<button aria-label="Toggle password visibility" class="absolute inset-y-0 right-0 flex items-center pr-4 text-on-surface-variant hover:text-primary transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
<!-- Forgot Password Link -->
<div class="flex justify-end mt-2">
<a class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors" href="#">Quên mật khẩu?</a>
</div>
<!-- Login Button -->
<button class="w-full py-3.5 bg-primary text-on-primary font-label-md text-label-md rounded-lg hover:bg-primary-container transition-colors shadow-sm focus:outline-none focus:ring-4 focus:ring-primary-fixed" type="submit">
                Đăng nhập
            </button>
</form>
<!-- Divider -->
<div class="mt-8 flex items-center justify-center space-x-4">
<div class="flex-1 h-px bg-outline-variant"></div>
<span class="font-body-md text-body-md text-on-surface-variant px-2">hoặc</span>
<div class="flex-1 h-px bg-outline-variant"></div>
</div>
<!-- Signup Link -->
<div class="mt-8 text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                Chưa có tài khoản? <a class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors ml-1" href="#">Đăng ký</a>
</p>
</div>
</main>
