<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Đăng nhập - ViVouch</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>

<script id="tailwind-config">

            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary": "#ffffff",
                        "on-secondary-fixed": "#410002",
                        "tertiary-container": "#9b6b00",
                        "surface": "#f9f9fc",
                        "on-primary-fixed-variant": "#00513a",
                        "on-tertiary-fixed": "#281900",
                        "outline-variant": "#bccac1",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary": "#ffffff",
                        "surface-container-highest": "#e2e2e5",
                        "primary-container": "#008560",
                        "on-background": "#1a1c1e",
                        "on-primary": "#ffffff",
                        "surface-bright": "#f9f9fc",
                        "on-surface-variant": "#3d4943",
                        "on-tertiary-fixed-variant": "#604100",
                        "on-tertiary-container": "#fffbff",
                        "on-primary-fixed": "#002115",
                        "surface-container-low": "#f3f3f6",
                        "surface-container-high": "#e8e8ea",
                        "secondary-fixed-dim": "#ffb4ac",
                        "outline": "#6d7a73",
                        "inverse-on-surface": "#f0f0f3",
                        "on-surface": "#1a1c1e",
                        "inverse-surface": "#2f3133",
                        "tertiary": "#7b5500",
                        "on-primary-container": "#f5fff7",
                        "error-container": "#ffdad6",
                        "primary-fixed": "#86f8c9",
                        "primary-fixed-dim": "#68dbae",
                        "tertiary-fixed": "#ffdeac",
                        "secondary-fixed": "#ffdad6",
                        "on-secondary-fixed-variant": "#93000d",
                        "secondary": "#b7131a",
                        "secondary-container": "#db322f",
                        "on-error": "#ffffff",
                        "primary": "#00694c",
                        "surface-tint": "#006c4e",
                        "on-error-container": "#93000a",
                        "surface-variant": "#e2e2e5",
                        "surface-dim": "#dadadc",
                        "tertiary-fixed-dim": "#ffba38",
                        "on-secondary-container": "#fffbff",
                        "error": "#ba1a1a",
                        "background": "#f9f9fc",
                        "surface-container": "#eeeef0",
                        "inverse-primary": "#68dbae"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "section-gap": "32px",
                        "gutter": "12px",
                        "container-margin": "16px",
                        "base": "8px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Be Vietnam Pro"],
                        "body-lg": ["Be Vietnam Pro"],
                        "label-md": ["Be Vietnam Pro"],
                        "price-display": ["Be Vietnam Pro"],
                        "headline-lg-mobile": ["Be Vietnam Pro"],
                        "body-md": ["Be Vietnam Pro"],
                        "display-lg": ["Be Vietnam Pro"],
                        "headline-md": ["Be Vietnam Pro"]
                    },
                    "fontSize": {
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "label-md": ["14px", {"lineHeight": "20px", "fontWeight": "600"}],

                        "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "display-lg": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}]

                }
            }
        }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-surface-container-low min-h-screen flex items-center justify-center p-4 antialiased">
<!-- Login Container -->
<main class="w-full max-w-[440px] flex flex-col items-center">
<!-- Header / Logo Area -->
<header class="text-center mb-8 w-full">
<h1 class="font-display-lg text-display-lg text-primary mb-2 tracking-tight">ViVouch</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Mua voucher — Tiết kiệm mỗi ngày</p>
</header>
<!-- Card Container for Form -->
<div class="bg-surface-container-lowest w-full rounded-xl shadow-lg border border-surface-variant/50 p-section-gap">
<form action="#" class="space-y-6" method="POST">
<!-- Email Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-1.5" for="email">Email</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-3 text-outline">
<span class="material-symbols-outlined text-[20px]" data-icon="mail">mail</span>
</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline-variant focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200" id="email" name="email" placeholder="email@example.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-1.5">
<label class="block font-label-md text-label-md text-on-surface" for="password">Mật khẩu</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-3 text-outline">
<span class="material-symbols-outlined text-[20px]" data-icon="lock">lock</span>
</span>
<input class="w-full pl-10 pr-12 py-3 bg-surface border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline-variant focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button aria-label="Toggle password visibility" class="absolute inset-y-0 right-0 flex items-center pr-3 text-outline hover:text-on-surface transition-colors cursor-pointer" id="togglePassword" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility" id="eyeIcon">visibility</span>
</button>
</div>
</div>
<!-- Forgot Password Link -->
<div class="flex justify-end">
<a class="font-label-md text-label-md text-primary hover:text-surface-tint transition-colors" href="#">Quên mật khẩu?</a>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary hover:bg-surface-tint text-on-primary font-label-md text-label-md py-3.5 rounded-lg transition-colors duration-200 shadow-sm flex justify-center items-center gap-2" type="submit">
                    Đăng nhập
                    <span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="flex items-center my-6">
<div class="flex-grow border-t border-surface-variant"></div>
<span class="px-4 font-label-md text-label-md text-outline">hoặc</span>
<div class="flex-grow border-t border-surface-variant"></div>
</div>
<!-- Sign Up Link -->
<div class="text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Chưa có tài khoản? 
                    <a class="font-label-md text-label-md text-primary hover:text-surface-tint transition-colors ml-1" href="#">Đăng ký</a>
</p>
</div>
</div>
</main>
<script>
        // Password visibility toggle logic
        document.addEventListener('DOMContentLoaded', function() {
            const togglePasswordBtn = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');

            togglePasswordBtn.addEventListener('click', function() {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                
                // Toggle icon
                if (type === 'password') {
                    eyeIcon.textContent = 'visibility';
                    eyeIcon.setAttribute('data-icon', 'visibility');
                } else {
                    eyeIcon.textContent = 'visibility_off';
                    eyeIcon.setAttribute('data-icon', 'visibility_off');
                }
            });
        });
    </script>
</body></html>
