<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Xác thực Voucher</title>

                    borderRadius: {

                    spacing: {

                    },
                    fontFamily: {
                        "headline-lg": ["Hanken Grotesk"],
                        "body-md": ["Inter"],

                }
            }
        }

<style>
        /* Custom animations and utilities */
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        
        @keyframes scan-line {
            0% { top: 1rem; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: calc(100% - 1.25rem); opacity: 0; }
        }
        
        .animate-scanner {
            animation: scan-line 2.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        /* Subtle grid background to simulate camera viewfinder context */
        .camera-grid {
            background-size: 30px 30px;
            background-image: 
                linear-gradient(to right, rgba(199, 196, 216, 0.3) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(199, 196, 216, 0.3) 1px, transparent 1px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col antialiased">
<!-- TopAppBar -->
<header class="flex justify-between items-center px-md w-full h-16 sticky top-0 z-40 bg-surface border-b border-outline-variant flat no shadows">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary text-[28px]">confirmation_number</span>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary">Xác thực Voucher</h1>
</div>
<div class="flex items-center gap-2">
<button class="p-2 hover:bg-surface-container-high transition-colors rounded-full text-on-surface-variant active:opacity-80 active:scale-95 flex items-center justify-center">
<span class="material-symbols-outlined">notifications</span>
</button>
<button class="p-2 hover:bg-surface-container-high transition-colors rounded-full text-on-surface-variant active:opacity-80 active:scale-95 flex items-center justify-center">
<span class="material-symbols-outlined">settings</span>
</button>
</div>
</header>
<!-- Content Canvas -->
<main class="flex-grow flex flex-col relative overflow-hidden">
<!-- Tab Navigation -->
<div class="px-md py-6 z-10 bg-background">
<div class="flex bg-surface-container rounded-lg p-1 shadow-inner">
<button class="flex-1 py-2.5 text-center font-body-md text-on-surface-variant rounded-md hover:bg-surface-container-high transition-colors font-medium">
                    Nhập mã
                </button>
<button class="flex-1 py-2.5 text-center font-body-md text-on-primary bg-primary rounded-md shadow-sm font-medium relative overflow-hidden group">
<span class="relative z-10">Quét QR</span>
<!-- Button inner glow effect -->
<div class="absolute inset-0 bg-gradient-to-b from-white/20 to-transparent pointer-events-none"></div>
</button>
</div>
</div>
<!-- Scanner Viewfinder Area -->
<div class="flex-grow flex flex-col items-center justify-center px-md pb-24 relative bg-surface-container-low camera-grid">
<!-- Contextual background gradient -->
<div class="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-transparent via-surface-container-low/80 to-surface-container-low pointer-events-none"></div>
<!-- Viewfinder Box -->
<div class="relative w-[280px] h-[280px] sm:w-[320px] sm:h-[320px] mb-8 bg-surface-container-lowest/50 backdrop-blur-sm shadow-sm rounded-xl overflow-hidden flex items-center justify-center z-10 border border-outline-variant/30">
<!-- Corner Brackets -->
<div class="absolute top-4 left-4 w-12 h-12 border-t-[3px] border-l-[3px] border-primary rounded-tl-lg"></div>
<div class="absolute top-4 right-4 w-12 h-12 border-t-[3px] border-r-[3px] border-primary rounded-tr-lg"></div>
<div class="absolute bottom-4 left-4 w-12 h-12 border-b-[3px] border-l-[3px] border-primary rounded-bl-lg"></div>
<div class="absolute bottom-4 right-4 w-12 h-12 border-b-[3px] border-r-[3px] border-primary rounded-br-lg"></div>
<!-- Animated Scan Line -->
<div class="absolute left-6 right-6 h-[2px] bg-primary shadow-[0_0_8px_rgba(53,37,205,0.8)] animate-scanner rounded-full"></div>
<!-- Center target indicator -->
<span class="material-symbols-outlined text-outline/20 text-6xl">qr_code_scanner</span>
</div>
<!-- Helper Text -->
<div class="z-10 bg-surface/80 backdrop-blur-md px-6 py-3 rounded-full shadow-sm border border-outline-variant/50">
<p class="font-body-md text-on-surface text-center max-w-[250px] font-medium flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-sm">info</span>
                    Đặt mã QR vào khung hình để quét
                </p>
</div>
</div>
</main>
<!-- BottomNavBar (Mobile Only) -->
<nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-2 pb-safe bg-surface border-t border-outline-variant rounded-t-xl shadow-[0_-4px_20px_rgba(79,70,229,0.05)]">
<!-- Tab 1: Xác thực (Active) -->
<button class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-6 py-1.5 transition-transform scale-95">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">qr_code_scanner</span>
<span class="font-label-caps text-label-caps mt-1">Xác thực</span>
</button>
<!-- Tab 2: Dashboard -->
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-variant transition-colors p-2 rounded-lg min-w-[64px]">
<span class="material-symbols-outlined">dashboard</span>
<span class="font-label-caps text-label-caps mt-1">Dashboard</span>
</button>
<!-- Tab 3: Vouchers -->
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-variant transition-colors p-2 rounded-lg min-w-[64px]">
<span class="material-symbols-outlined">local_activity</span>
<span class="font-label-caps text-label-caps mt-1">Vouchers</span>
</button>
</nav>
<!-- Decorative Top Shadow for Bottom Nav integration -->
<div class="md:hidden fixed bottom-[calc(env(safe-area-inset-bottom)+56px)] left-0 w-full h-8 bg-gradient-to-t from-surface/50 to-transparent pointer-events-none z-40"></div>
</body></html>
