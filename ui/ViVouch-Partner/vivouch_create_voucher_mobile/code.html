<body class="bg-surface text-on-surface font-body-md min-h-screen pb-[80px]">
<!-- Top App Bar -->
<header class="bg-surface w-full sticky top-0 z-50 flex justify-between items-center px-gutter h-16 w-full lg:hidden border-b border-border-subtle">
<button class="text-on-surface-variant hover:bg-surface-container-high transition-colors p-2 rounded-full active:opacity-80 transition-all">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<h1 class="font-title-lg text-title-lg text-primary font-bold">Tạo Voucher</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content Canvas (Mobile Single Column) -->
<main class="flex flex-col gap-stack-gap p-container-margin-mobile md:hidden">
<!-- Live Preview Toggle (Collapsible representation) -->
<div class="bg-[#F8F1F6] border border-[#E6E1E5] rounded-xl p-4 shadow-[0px_4px_12px_rgba(0,0,0,0.05)] flex items-center justify-between cursor-pointer">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">visibility</span>
<div>
<h2 class="font-label-lg text-label-lg text-on-surface">Xem trước hiển thị</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Bản nháp voucher</p>
</div>
</div>
<span class="material-symbols-outlined text-outline">expand_more</span>
</div>
<!-- Form Section 1: Thông tin cơ bản -->
<section class="border border-border-subtle rounded-xl p-4 bg-surface-bright flex flex-col gap-4">
<h2 class="font-title-lg text-title-lg text-primary-container border-b border-border-subtle pb-2">Thông tin cơ bản</h2>
<div class="flex flex-col gap-1">
<label class="font-label-lg text-label-lg text-on-surface-variant">Tên Voucher</label>
<input class="bg-[#F8F1F6] border-0 border-b-2 border-border-subtle focus:border-primary-container focus:ring-0 px-3 py-2 text-on-surface rounded-t-DEFAULT w-full transition-colors" placeholder="Nhập tên voucher..." type="text"/>
</div>
<div class="flex flex-col gap-1">
<label class="font-label-lg text-label-lg text-on-surface-variant">Mô tả ngắn</label>
<textarea class="bg-[#F8F1F6] border-0 border-b-2 border-border-subtle focus:border-primary-container focus:ring-0 px-3 py-2 text-on-surface rounded-t-DEFAULT w-full transition-colors" placeholder="Mô tả ưu đãi..." rows="3"></textarea>
</div>
<div class="flex flex-col gap-1">
<label class="font-label-lg text-label-lg text-on-surface-variant">Ảnh đại diện</label>
<div class="border-2 border-dashed border-outline-variant rounded-lg p-6 flex flex-col items-center justify-center bg-surface-container-low text-center cursor-pointer hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-4xl text-outline mb-2">image_search</span>
<p class="font-body-md text-body-md text-on-surface-variant">Tải ảnh lên (Tỉ lệ 16:9)</p>
</div>
</div>
</section>
<!-- Form Section 2: Giá & Số lượng -->
<section class="border border-border-subtle rounded-xl p-4 bg-surface-bright flex flex-col gap-4">
<h2 class="font-title-lg text-title-lg text-primary-container border-b border-border-subtle pb-2">Giá &amp; Số lượng</h2>
<div class="grid grid-cols-2 gap-4">
<div class="flex flex-col gap-1">
<label class="font-label-lg text-label-lg text-on-surface-variant">Giá trị giảm</label>
<div class="relative">
<input class="bg-[#F8F1F6] border-0 border-b-2 border-border-subtle focus:border-primary-container focus:ring-0 px-3 py-2 text-on-surface rounded-t-DEFAULT w-full transition-colors pr-10" placeholder="0" type="number"/>
<span class="absolute right-3 top-2 font-label-lg text-label-lg text-on-surface-variant">VND</span>
</div>
</div>
<div class="flex flex-col gap-1">
<label class="font-label-lg text-label-lg text-on-surface-variant">Số lượng</label>
<input class="bg-[#F8F1F6] border-0 border-b-2 border-border-subtle focus:border-primary-container focus:ring-0 px-3 py-2 text-on-surface rounded-t-DEFAULT w-full transition-colors" placeholder="100" type="number"/>
</div>
</div>
<label class="flex items-center gap-3 cursor-pointer">
<input class="w-5 h-5 rounded border-outline text-primary-container focus:ring-primary-container bg-[#F8F1F6]" type="checkbox"/>
<span class="font-body-md text-body-md text-on-surface">Không giới hạn số lượng</span>
</label>
</section>
<!-- Form Section 3: Thời gian -->
<section class="border border-border-subtle rounded-xl p-4 bg-surface-bright flex flex-col gap-4">
<h2 class="font-title-lg text-title-lg text-primary-container border-b border-border-subtle pb-2">Thời gian</h2>
<div class="flex flex-col gap-1">
<label class="font-label-lg text-label-lg text-on-surface-variant">Ngày bắt đầu</label>
<div class="relative">
<input class="bg-[#F8F1F6] border-0 border-b-2 border-border-subtle focus:border-primary-container focus:ring-0 px-3 py-2 pl-10 text-on-surface rounded-t-DEFAULT w-full transition-colors" type="date"/>
<span class="material-symbols-outlined absolute left-3 top-2 text-outline">calendar_today</span>
</div>
</div>
<div class="flex flex-col gap-1">
<label class="font-label-lg text-label-lg text-on-surface-variant">Ngày kết thúc</label>
<div class="relative">
<input class="bg-[#F8F1F6] border-0 border-b-2 border-border-subtle focus:border-primary-container focus:ring-0 px-3 py-2 pl-10 text-on-surface rounded-t-DEFAULT w-full transition-colors" type="date"/>
<span class="material-symbols-outlined absolute left-3 top-2 text-outline">event_busy</span>
</div>
</div>
</section>
<!-- Form Section 4: Chi nhánh áp dụng -->
<section class="border border-border-subtle rounded-xl p-4 bg-surface-bright flex flex-col gap-4">
<h2 class="font-title-lg text-title-lg text-primary-container border-b border-border-subtle pb-2">Chi nhánh áp dụng</h2>
<div class="flex flex-col gap-1">
<div class="relative">
<select class="bg-[#F8F1F6] border-0 border-b-2 border-border-subtle focus:border-primary-container focus:ring-0 px-3 py-2 text-on-surface rounded-t-DEFAULT w-full transition-colors appearance-none pr-10">
<option>Tất cả chi nhánh</option>
<option>Chi nhánh Quận 1</option>
<option>Chi nhánh Quận 3</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-2 text-outline pointer-events-none">expand_more</span>
</div>
</div>
<!-- Tags for selected branches -->
<div class="flex flex-wrap gap-2">
<div class="bg-secondary-fixed text-on-secondary-fixed font-label-md text-label-md px-3 py-1 rounded-full flex items-center gap-1">
                    Tất cả chi nhánh
                    <span class="material-symbols-outlined text-[14px] cursor-pointer">close</span>
</div>
</div>
</section>
<!-- Form Section 5: Điều kiện sử dụng -->
<section class="border border-border-subtle rounded-xl p-4 bg-surface-bright flex flex-col gap-4">
<h2 class="font-title-lg text-title-lg text-primary-container border-b border-border-subtle pb-2">Điều kiện sử dụng</h2>
<div class="flex flex-col gap-1">
<textarea class="bg-[#F8F1F6] border-0 border-b-2 border-border-subtle focus:border-primary-container focus:ring-0 px-3 py-2 text-on-surface rounded-t-DEFAULT w-full transition-colors" placeholder="Nhập các điều kiện áp dụng (mỗi dòng 1 điều kiện)..." rows="4"></textarea>
</div>
</section>
</main>
<!-- Persistent Bottom Action Bar -->
<div class="fixed bottom-0 left-0 w-full bg-surface-bright border-t border-border-subtle p-4 flex gap-3 z-50 shadow-[0px_-4px_12px_rgba(0,0,0,0.05)] md:hidden">
<button class="flex-1 py-3 px-4 border border-primary-container text-primary-container font-label-lg text-label-lg font-bold rounded-full text-center hover:bg-surface-container-low transition-colors">
            Lưu nháp
        </button>
<button class="flex-1 py-3 px-4 bg-primary-container text-on-primary font-label-lg text-label-lg font-bold rounded-full text-center hover:opacity-90 transition-opacity">
            Gửi kiểm duyệt
        </button>
</div>
</body></html>
