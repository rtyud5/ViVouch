name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: voucher_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d voucher_platform"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/voucher_platform?schema=public
      JWT_ACCESS_SECRET: ci_access_secret_at_least_32_characters
      JWT_REFRESH_SECRET: ci_refresh_secret_at_least_32_characters
      CLIENT_URL: http://localhost:5173
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npx --no-install prisma generate
      - run: npx --no-install prisma migrate deploy
      - run: npm run prisma:seed
      - run: npm test
      - run: npm audit --omit=dev --audit-level=high

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      VITE_API_BASE_URL: http://localhost:5000/api
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npm test -- --run
      - run: npm run build
      - run: npm audit --omit=dev --audit-level=high

  evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/verify-evidence.mjs
